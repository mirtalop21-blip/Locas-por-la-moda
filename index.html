<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Locas por la Moda | Boutique Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700&family=Montserrat:wght@200;400;600&display=swap');
        :root { --soft-bg: #ffffff; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--soft-bg); color: #1a1a1a; scroll-behavior: smooth; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .sidebar { transition: transform 0.5s cubic-bezier(0.77, 0, 0.175, 1); transform: translateX(-100%); }
        .sidebar.active { transform: translateX(0); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .video-container video { width: 100%; height: 100%; object-fit: cover; }
        .product-card img { transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>

    <div id="sidebar" class="fixed inset-y-0 left-0 w-80 bg-white z-[100] p-12 sidebar flex flex-col border-r shadow-2xl">
        <button onclick="toggleSidebar()" class="text-left text-xs tracking-widest uppercase mb-12 font-bold"><i class="fa-solid fa-xmark mr-2"></i> Cerrar</button>
        <h3 class="font-serif italic text-3xl mb-10 text-stone-800">Colecciones</h3>
        <nav id="cat-list" class="space-y-6 flex flex-col text-[11px] tracking-[0.3em] uppercase font-semibold">
            </nav>
        <div class="mt-auto border-t pt-10 text-[10px] tracking-[0.2em] space-y-4 opacity-40">
            <a href="https://instagram.com/locas_por_la_moda_17" target="_blank" class="block uppercase">Instagram</a>
            <a href="https://wa.me/5491166860054" target="_blank" class="block uppercase">Contacto WhatsApp</a>
        </div>
    </div>

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 border-b border-gray-50">
        <div class="max-w-7xl mx-auto px-8 h-24 flex justify-between items-center">
            <button onclick="toggleSidebar()" class="text-[10px] tracking-[0.2em] font-black uppercase"><i class="fa-solid fa-bars-staggered text-lg"></i></button>
            <div class="absolute left-1/2 -translate-x-1/2 text-center">
                <h1 class="font-serif text-2xl md:text-3xl tracking-tighter uppercase font-bold">LOCAS <span class="italic font-normal">X LA MODA</span></h1>
            </div>
            <div class="flex gap-5">
                <a href="https://wa.me/5491166860054" target="_blank" class="text-green-500 text-xl"><i class="fa-brands fa-whatsapp"></i></a>
            </div>
        </div>
    </nav>

    <section id="video-section" class="py-12 bg-stone-50 overflow-hidden hidden">
        <div class="max-w-7xl mx-auto px-8 mb-8 flex justify-between items-end">
            <h2 class="font-serif text-2xl italic text-stone-700">Looks en movimiento</h2>
            <span class="text-[8px] tracking-[0.3em] uppercase font-bold opacity-30">Desliza para ver</span>
        </div>
        <div id="video-grid" class="flex gap-4 overflow-x-auto px-8 no-scrollbar scroll-smooth">
            </div>
    </section>

    <main class="max-w-7xl mx-auto px-8 py-20">
        <div class="mb-16">
            <h3 id="current-cat" class="font-serif text-4xl italic mb-4">Nueva Colección</h3>
            <div class="h-[1px] w-full bg-gray-100"></div>
        </div>
        <div id="product-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-x-10 gap-y-20">
            </div>
    </main>

    <footer class="py-20 bg-white border-t text-center">
        <p class="font-serif italic text-2xl mb-4 text-stone-800">Locas por la Moda</p>
        <p class="text-[9px] tracking-[0.4em] uppercase opacity-40">Merlo, Buenos Aires • Envíos a todo el país</p>
    </footer>

    <script>
        // EL LINK DE TU PLANILLA (CSV)
        const SHEET_URL = 'https://docs.google.com/spreadsheets/d/1fCVGTaHJH083yc0N4Wu1sNf6pw_VbgXimg5fKagYjfM/gviz/tq?tqx=out:csv';
        
        let products = [];

        function toggleSidebar() { document.getElementById('sidebar').classList.toggle('active'); }

        async function init() {
            Papa.parse(SHEET_URL, {
                download: true, header: true,
                complete: function(results) {
                    products = results.data.filter(p => p.NOMBRE);
                    renderCategories();
                    renderGrid(products);
                    renderVideos(products);
                }
            });
        }

        function renderCategories() {
            const cats = ['TODOS', ...new Set(products.map(p => p.CATEGORIA))];
            document.getElementById('cat-list').innerHTML = cats.map(c => `
                <button onclick="filter('${c}')" class="text-left hover:text-stone-400 transition-colors">${c}</button>
            `).join('');
        }

        function renderVideos(items) {
            const videos = items.filter(p => p.VIDEO_URL && p.VIDEO_URL.includes('mp4'));
            const container = document.getElementById('video-grid');
            if(videos.length > 0) {
                document.getElementById('video-section').classList.remove('hidden');
                container.innerHTML = videos.map(v => `
                    <div class="min-w-[260px] h-[450px] bg-stone-200 video-container relative group">
                        <video src="${v.VIDEO_URL}" muted loop onmouseover="this.play()" onmouseout="this.pause()" onclick="this.paused ? this.play() : this.pause()"></video>
                        <div class="absolute bottom-6 left-6 text-white pointer-events-none">
                            <p class="text-[9px] font-bold uppercase tracking-widest">${v.NOMBRE}</p>
                        </div>
                    </div>
                `).join('');
            }
        }

        function renderGrid(items) {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = items.map(p => `
                <div class="group cursor-pointer" onclick="buy('${p.WS_LINK}', '${p.NOMBRE}')">
                    <div class="aspect-[2/3] overflow-hidden bg-stone-50 mb-8 relative">
                        <img src="${p.IMAGEN_URL}" class="w-full h-full object-cover grayscale-[10%] group-hover:grayscale-0">
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-6">
                            <span class="bg-white/90 backdrop-blur w-full py-4 text-[9px] font-bold tracking-widest uppercase text-center shadow-sm">Ver en WhatsApp</span>
                        </div>
                    </div>
                    <h4 class="text-[10px] tracking-[0.2em] uppercase font-bold mb-2 text-stone-800">${p.NOMBRE}</h4>
                    <p class="text-stone-400 text-xs font-light italic">$${Number(p.PRECIO).toLocaleString()}</p>
                </div>
            `).join('');
        }

        function filter(c) {
            document.getElementById('current-cat').innerText = c === 'TODOS' ? 'Nueva Colección' : c;
            const filtered = c === 'TODOS' ? products : products.filter(p => p.CATEGORIA === c);
            renderGrid(filtered);
            toggleSidebar();
            window.scrollTo({top: 400, behavior: 'smooth'});
        }

        function buy(link, name) {
            if(link && link.includes('wa.me')) {
                window.open(link, '_blank');
            } else {
                const msg = `Hola! Me interesa el producto: ${name}`;
                window.open(`https://wa.me/5491166860054?text=${encodeURIComponent(msg)}`, '_blank');
            }
        }

        init();
    </script>
</body>
</html>
